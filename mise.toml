min_version = "2026.7.5"

[settings]
dotfiles.default_mode = "template"

[dotfiles]
"~/.config/amp/AGENTS.md" = "src/AGENTS.md"
"~/.config/amp/settings.json" = "src/config/amp/settings.json"
"~/.config/fish/functions" = { source = "src/config/fish/functions", mode = "copy" }
"~/.config/fish/config.fish" = "src/config/fish/config.fish"
"~/.config/mise/config.toml" = "src/config/mise/config.toml"
"~/.config/mise/miserc.toml" = "src/config/mise/miserc.toml"
"~/.mcporter/mcporter.json" = "src/mcporter/mcporter.json"
"~/.pi/agent/extensions" = { source = "src/pi/agent/extensions", mode = "copy" }
"~/.pi/agent/prompts" = { source = "src/pi/agent/prompts", mode = "copy" }
"~/.pi/agent/AGENTS.md" = "src/AGENTS.md"
"~/.pi/agent/settings.json" = "src/pi/agent/settings.json"
"~/.pi/agent/spark.json" = "src/pi/agent/spark.json"
"~/.gitconfig" = "src/gitconfig"
"~/.gitignore" = "src/gitignore"
"~/.hushlogin" = "src/hushlogin"
"~/.vimrc" = "src/vimrc"

[tasks.bootstrap]
description = "Apply setup that is not declarative"
dir = "{{ config_root }}"
run = [
  "rm -rf ~/.amp/bin ~/.local/bin/amp",
]
