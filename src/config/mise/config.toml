[settings]
minimum_release_age = "0s"

[tools]
# Utilities
"bat" = "latest"
"eza" = "0.23.4" # Pinned: "latest" currently fails to install
"fd" = "latest"
"gh" = "latest"
"jq" = "latest"
"ripgrep" = "latest"
"zoxide" = "latest"
"usage" = "latest"
# Languages
"node" = "lts"
"bun" = "latest"
"npm:corepack" = "latest"
"python" = "latest"
"uv" = "latest"
"rust" = "latest"
# AI tools
"amp" = { version = "latest", "prerelease" = true }
"github:earendil-works/pi" = "latest"
"npm:agent-browser" = "latest"
"npm:mcporter" = "latest"

[tasks.update]
description = "Update the development environment"
run = [
  { task = "update:dotfiles" },
  { task = "update:packages" },
  { task = "update:mise" },
  { task = "update:amp" },
  { task = "update:pi" },
  { task = "update:agent-skills" },
  {%- if "work" in mise_env %}
  { task = "update:bk" },
  {%- endif %}
]

[tasks."update:dotfiles"]
description = "Update dotfiles and converge the machine"
dir = "{{ env.HOME }}/workspace/github/zlliang/dotfiles"
run = ["git pull --ff-only", "mise bootstrap --yes"]

[tasks."update:packages"]
description = "Upgrade managed system packages"
dir = "{{ env.HOME }}/workspace/github/zlliang/dotfiles"
run = "mise bootstrap packages upgrade --yes"

[tasks."update:mise"]
description = "Update mise and managed tools"
run = ["mise self-update -y", "mise upgrade", "mise prune"]

[tasks."update:amp"]
description = "Update Amp"
run = "amp update"

[tasks."update:pi"]
description = "Update Pi extensions"
dir = "{{ env.HOME }}/.pi/agent/extensions"
run = ["pi update --extensions", "npm update"]

[tasks."update:agent-skills"]
description = "Update global agent skills"
run = [
  "rm -rf ~/.agents ~/.pi/agent/skills",
  "bunx --bun skills add zlliang/skills --full-depth -g -y -a amp",
  "bunx --bun skills add vercel-labs/agent-browser --skill agent-browser --full-depth -g -y -a amp",
]
